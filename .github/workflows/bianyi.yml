name: Build Rust EXE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # 允许手动点击按钮触发

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest  # 关键：使用 Windows 服务器来编译 exe

    steps:
    - uses: actions/checkout@v4
    - name: Install VCPKG and Dependencies
      run: |
        # 安装 vcpkg (Windows 下的 C++ 包管理器)
        git clone https://github.com/Microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat
        
        # 设置环境变量，告诉编译器 vcpkg 在哪里
        echo "VCPKG_ROOT=$PWD/vcpkg" >> $env:GITHUB_ENV
        
        # 安装 magnum-opus 依赖的核心库 (根据 magnum-opus 的文档，通常需要这些)
        .\vcpkg\vcpkg install openssl:x64-windows-static-md
        .\vcpkg\vcpkg install libvpx:x64-windows-static-md
        .\vcpkg\vcpkg install libyuv:x64-windows-static-md
        # 如果还有其他报错，可能需要添加更多库，但以上是常见的
  - name: Build Release
  run: |
    cargo build --release --verbose
  env:
    # 强制 cargo 使用 vcpkg 提供的库
    VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
    CARGO_TARGET_DIR: target

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rust-app-exe
        path: target/release/rustby9527.exe
