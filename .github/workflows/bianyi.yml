name: 名称: 构建 Rust EXE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # --- 步骤 1：准备 vcpkg 环境 (关键！) ---
    - name: Setup vcpkg Environment
      run: |
        # 1. 克隆 vcpkg
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        # 2. 初始化
        .\bootstrap-vcpkg.bat
        
        # 3. 【关键修复】强制注入清华镜像源配置
        # 这解决了原项目 vcpkg.json 因网络问题卡死的问题
        @"
        {
          "registries": [
            {
              "kind": "git",
              "repository": "https://mirrors.tuna.tsinghua.edu.cn/git/vcpkg/ports.git",
              "packages": [ "*" ]
            }
          ]
        }
        "@ | Out-File -FilePath "vcpkg-configuration.json" -Encoding utf8

        # 4. 设置环境变量，让 cargo 能找到 vcpkg
        echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "${{ github.workspace }}/vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    # --- 步骤 2：编译 (cargo 会自动检测 vcpkg.json) ---
    - name: Build Release
      run: cargo build --release --verbose
      env:
        VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        # 显式指定 vcpkg 目标平台，防止自动检测错误
        VCPKG_DEFAULT_TRIPLET: x64-windows-static-md

    # --- 步骤 3：上传成果 ---
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rust-app-exe
        path: target/release/rustby9527.exe
