name: Build Rust EXE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # --- 步骤 1：安装 vcpkg 和依赖库 ---
    # 这一步是关键，必须先装好 C++ 库
    - name: Setup vcpkg
      run: |
        # 克隆 vcpkg
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        # 初始化
        .\bootstrap-vcpkg.bat
        
        # 安装 magnum-opus 必须的依赖
        .\vcpkg install openssl:x64-windows-static-md
        .\vcpkg install libvpx:x64-windows-static-md
        .\vcpkg install libyuv:x64-windows-static-md
        
        # 设置环境变量 (关键修复点)
        # 这会把 vcpkg 的路径写入系统环境，让下一步能读到
        echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "${{ github.workspace }}/vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    # --- 步骤 2：编译 Rust 代码 ---
    - name: Build Release
      run: cargo build --release --verbose
      # 这里显式声明环境变量，双重保险
      env:
        VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        CARGO_TARGET_DIR: ./target

    # --- 步骤 3：下载成果 ---
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rust-app-exe
        path: target/release/rustby9527.exe
