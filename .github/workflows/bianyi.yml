name: Build Rust EXE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # 允许手动点击按钮触发

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # --- 关键步骤：安装 vcpkg 和依赖库 ---
    - name: Install VCPKG Dependencies
      run: |
        # 1. 克隆 vcpkg 工具
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat -disableMetrics
        
        # 2. 安装 magnum-opus 需要的核心库
        # 注意：--headless 模式防止交互提示导致卡死
        .\vcpkg install openssl:x64-windows-static-md --headless
        .\vcpkg install libvpx:x64-windows-static-md --headless
        .\vcpkg install libyuv:x64-windows-static-md --headless
        
        # 3. 设置环境变量，让后续步骤能找到 vcpkg
        # 注意：这里使用的是 GitHub Actions 的标准语法
        echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "${{ github.workspace }}/vcpkg" | Out-File -FilePath $env:GITHUB_ROOT -Encoding utf8 -Append

    # --- 编译步骤 ---
    - name: Build Release
      run: cargo build --release --verbose

    # --- 上传结果 ---
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rust-app-exe
        # 这里的 rustby9527.exe 请确保和你的 Cargo.toml 里的名字一致
        path: target/release/rustby9527.exe
